<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>센트럴온누리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F9FF;
  --surface:#FFFFFF;
  --surface2:#F1F3FA;
  --primary:#5B5EF4;
  --primary-d:#4447D4;
  --primary-l:#EEEEFF;
  --primary-ll:#F5F5FF;
  --red:#F04444;--red-l:#FFF1F1;
  --amber:#F59E0B;--amber-l:#FFFBEB;
  --green:#0EAD69;--green-l:#EDFAF3;
  --text:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --border:#E5E7EB;--border2:#D1D5DB;
  --shadow:0 2px 8px rgba(17,24,39,.06);
  --shadow-md:0 4px 20px rgba(17,24,39,.1);
  --shadow-lg:0 8px 40px rgba(17,24,39,.14);
  --r:14px;--r-sm:10px;--r-xs:8px;
}
html,body{height:100%;font-family:'Noto Sans KR','Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}

/* ─── LOGIN ─────────────────────────────── */
.login-wrap{
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:32px 24px;
  background:#0D0F1C;position:relative;overflow:hidden;
}
.login-wrap::after{
  content:'';position:absolute;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(91,94,244,.18) 0%,transparent 70%);
  top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;
}
.login-card{
  position:relative;z-index:1;width:100%;max-width:380px;
  display:flex;flex-direction:column;align-items:center;
}
.login-icon-wrap{
  width:64px;height:64px;border-radius:20px;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  box-shadow:0 8px 32px rgba(91,94,244,.35);
}
.login-card h1{
  color:#fff;font-size:22px;font-weight:800;
  margin-bottom:6px;letter-spacing:-.4px;text-align:center;
}
.login-card p{color:rgba(255,255,255,.38);font-size:13px;margin-bottom:32px;text-align:center}
.login-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;
  width:100%;margin-bottom:16px;
}
.login-grid>div{position:relative}
.login-btn{
  width:100%;padding:14px 0;border-radius:12px;border:none;
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.9);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .18s;font-family:inherit;
  border:1px solid rgba(255,255,255,.1);
}
.login-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px)}
.login-btn:active{transform:scale(.94);background:rgba(255,255,255,.18)}
.login-btn.admin{border-color:rgba(245,158,11,.35);color:#FCD34D}
.del-x{
  position:absolute;top:5px;right:6px;font-size:10px;
  color:rgba(255,255,255,.25);cursor:pointer;z-index:2;
  padding:2px 4px;line-height:1;transition:color .15s;
}
.del-x:hover{color:rgba(240,68,68,.8)}
.login-add-row{display:flex;gap:8px;width:100%}
.login-add-row input{
  flex:1;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  color:#fff;padding:11px 14px;font-size:14px;outline:none;font-family:inherit;
}
.login-add-row input::placeholder{color:rgba(255,255,255,.22)}
.login-add-row input:focus{border-color:rgba(91,94,244,.6);background:rgba(91,94,244,.1)}
.login-add-row button{
  background:var(--primary);border:none;border-radius:10px;
  color:#fff;padding:11px 18px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap;
}
.login-add-row button:hover{background:var(--primary-d)}
.login-add-row button:active{transform:scale(.95)}

/* ─── APP SHELL ─────────────────────────── */
.app{display:none;flex-direction:column;height:100dvh}
.top-bar{
  height:54px;padding:0 18px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.top-bar-left{display:flex;align-items:center;gap:9px}
.top-bar-left h2{font-size:17px;font-weight:800;letter-spacing:-.35px;color:var(--text)}
.top-icon-badge{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(91,94,244,.3);flex-shrink:0;
}
.user-tag{
  font-size:12px;font-weight:600;color:var(--text2);
  background:var(--surface2);padding:5px 12px;
  border-radius:20px;cursor:pointer;border:1px solid var(--border);
  transition:all .15s;display:flex;align-items:center;gap:5px;
}
.user-tag:hover{border-color:var(--border2);background:var(--border)}
.main{flex:1;overflow-y:auto;padding:14px 16px 86px;-webkit-overflow-scrolling:touch}

/* ─── BOTTOM NAV ─────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.95);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(229,231,235,.7);
  display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav button{
  flex:1;border:none;background:none;padding:8px 0 6px;
  font-size:10px;font-weight:700;color:var(--text3);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;position:relative;font-family:inherit;
  letter-spacing:.3px;transition:color .15s;
}
.bottom-nav button.active{color:var(--primary)}
.nav-ico{
  width:42px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:all .2s;
}
.bottom-nav button.active .nav-ico{background:var(--primary-l)}
.badge-dot{
  position:absolute;top:5px;right:50%;margin-right:-18px;
  background:var(--red);color:#fff;font-size:9px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;
  display:none;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid #fff;
}

/* ─── FAB ───────────────────────────────── */
.fab{
  position:fixed;bottom:74px;right:18px;
  width:54px;height:54px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);
  color:#fff;border:none;cursor:pointer;z-index:99;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(91,94,244,.42);transition:all .2s;
}
.fab:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 28px rgba(91,94,244,.5)}
.fab:active{transform:scale(.91)}

/* ─── SECTION LABEL ─────────────────────── */
.section-label{
  font-size:11px;font-weight:700;color:var(--text3);
  letter-spacing:.7px;text-transform:uppercase;
  padding:18px 2px 10px;display:flex;align-items:center;gap:6px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);margin-left:4px}

/* ─── CARDS ─────────────────────────────── */
.card{
  background:var(--surface);border-radius:var(--r);
  padding:11px 14px;margin-bottom:7px;cursor:pointer;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:transform .18s,box-shadow .18s,border-color .18s;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 2px 2px 0}
.card.필독::before{background:var(--red)}
.card.중요::before{background:var(--amber)}
.card.일반::before{background:var(--green)}
.card.expired{opacity:.4;filter:grayscale(.4)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(91,94,244,.18)}
.card:active{transform:scale(.98)}
.title-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.title-row h3{font-size:14px;font-weight:700;flex:1;color:var(--text);letter-spacing:-.2px;line-height:1.3}
.cat-tag{
  font-size:10px;font-weight:700;letter-spacing:.3px;
  color:var(--primary);background:var(--primary-ll);
  padding:3px 8px;border-radius:20px;white-space:nowrap;
  border:1px solid rgba(91,94,244,.15);flex-shrink:0;margin-top:1px;
}
.meta{
  font-size:11px;color:var(--text3);
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:9px;
  align-items:center;
}
.meta-inline{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;overflow:hidden;}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--border2);flex-shrink:0}
.unread-ring{
  width:7px;height:7px;border-radius:50%;background:var(--red);
  flex-shrink:0;margin-top:4px;
  box-shadow:0 0 0 3px rgba(240,68,68,.15);
}
.confirm-bar{display:flex;align-items:center;gap:8px;margin-top:0}
.bar-bg{flex:1;min-width:40px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green),#34D399);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-text{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;min-width:28px;text-align:right}

/* ─── ADMIN BANNER ───────────────────────── */
.admin-tools{
  background:linear-gradient(135deg,#FFFBEB,#FEF9EE);
  border:1px solid #FDE68A;border-radius:var(--r-sm);
  padding:11px 14px;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.admin-tools .a-label{
  font-size:11px;font-weight:700;color:#92400E;
  display:flex;align-items:center;gap:5px;letter-spacing:.2px;
}
.admin-tools .a-btn{
  margin-left:auto;padding:5px 13px;border-radius:7px;
  border:1.5px solid #D97706;background:transparent;
  color:#D97706;font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.admin-tools .a-btn:hover{background:#D97706;color:#fff}

/* ─── EMPTY STATE ────────────────────────── */
.empty-state{text-align:center;padding:72px 20px;color:var(--text3)}
.empty-state .e-ico{display:flex;justify-content:center;margin-bottom:16px;opacity:.25}
.empty-state p{font-size:14px;line-height:1.8;color:var(--text3)}

/* ─── FULL VIEWS ─────────────────────────── */
.full-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column}
.full-view.show{display:flex}
.view-header{
  height:54px;padding:0 16px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.back-btn{
  width:34px;height:34px;border-radius:9px;border:none;
  background:var(--surface2);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;
}
.back-btn:hover{background:var(--border)}
.back-btn:active{transform:scale(.9)}
.view-header h2{font-size:16px;font-weight:700;flex:1;letter-spacing:-.25px;color:var(--text)}
.hdr-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:8px;border:none;
  background:var(--primary-l);color:var(--primary);
  font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
.hdr-btn:hover{background:var(--primary);color:#fff}
.view-body{flex:1;overflow-y:auto;padding:18px 16px;-webkit-overflow-scrolling:touch}

/* ─── DETAIL ─────────────────────────────── */
.imp-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;padding:4px 11px;
  border-radius:20px;margin-bottom:14px;letter-spacing:.2px;
}
.imp-badge.필독{background:var(--red-l);color:var(--red)}
.imp-badge.중요{background:var(--amber-l);color:#B45309}
.imp-badge.일반{background:var(--green-l);color:var(--green)}
.content-area{
  background:var(--surface);border-radius:var(--r);
  padding:18px;margin-bottom:14px;
  white-space:pre-wrap;line-height:1.8;font-size:15px;
  border:1px solid var(--border);color:var(--text);
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.info-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:11px 13px;
}
.info-item .lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-item .val{font-size:14px;font-weight:700;color:var(--text)}
.confirm-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;margin-bottom:14px;
}
.confirm-section h4{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;
}
.confirm-list{display:flex;flex-wrap:wrap;gap:7px}
.confirm-chip{
  font-size:12px;padding:5px 12px;border-radius:20px;
  font-weight:600;border:1px solid transparent;
  display:flex;align-items:center;gap:4px;
}
.confirm-chip.done{background:var(--green-l);color:var(--green);border-color:rgba(14,173,105,.18)}
.confirm-chip.pending{background:var(--red-l);color:var(--red);border-color:rgba(240,68,68,.15)}
.big-confirm-btn{
  width:100%;padding:15px;border:none;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  margin-bottom:14px;font-family:inherit;
  box-shadow:0 4px 16px rgba(91,94,244,.32);
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;
}
.big-confirm-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,94,244,.42)}
.big-confirm-btn:active{transform:scale(.97)}
.big-confirm-btn.confirmed{
  background:linear-gradient(135deg,var(--green),#0D9557);
  box-shadow:0 4px 16px rgba(14,173,105,.28);
}
.version-section{margin-bottom:14px}
.version-toggle{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 15px;cursor:pointer;
  font-size:12px;font-weight:600;color:var(--text2);
  display:flex;justify-content:space-between;align-items:center;
  transition:background .15s;
}
.version-toggle:hover{background:var(--surface2)}
.version-list{display:none}
.version-list.show{display:block;margin-top:6px}
.version-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 15px;margin-bottom:6px;
  border-left:3px solid var(--primary);
}
.version-item .v-head{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px}
.version-item .v-note{font-size:13px;color:var(--text2);line-height:1.65}
.detail-attach{margin-bottom:14px}
.detail-attach h4{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.detail-attach-list{display:flex;flex-wrap:wrap;gap:8px}
.detail-attach-img{width:76px;height:76px;border-radius:10px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.detail-attach-file{
  display:flex;align-items:center;gap:6px;
  background:var(--primary-l);border:1px solid rgba(91,94,244,.18);
  border-radius:var(--r-xs);padding:8px 12px;
  font-size:12px;font-weight:600;color:var(--primary);text-decoration:none;cursor:pointer;
}

/* ─── COMPOSE ────────────────────────────── */
.compose-body label{
  display:block;font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:8px;margin-top:20px;
}
.compose-body label:first-child{margin-top:0}
.compose-body input[type=text],.compose-body textarea{
  width:100%;padding:12px 14px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:15px;background:var(--surface);font-family:inherit;
  color:var(--text);resize:vertical;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.compose-body input[type=text]:focus,.compose-body textarea:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(91,94,244,.1);
}
.compose-body textarea{min-height:120px;line-height:1.7}
.cat-chips{display:flex;flex-wrap:wrap;gap:7px}
.cat-chip{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:12px;font-weight:600;color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.cat-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ll)}
.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(91,94,244,.28)}
.imp-chips{display:flex;gap:8px}
.imp-chip{
  flex:1;padding:11px 6px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:var(--surface);
  font-size:12px;text-align:center;cursor:pointer;font-weight:600;
  color:var(--text2);transition:all .15s;
}
.imp-chip[data-v="필독"].active{background:var(--red-l);color:var(--red);border-color:var(--red)}
.imp-chip[data-v="중요"].active{background:var(--amber-l);color:#B45309;border-color:var(--amber)}
.imp-chip[data-v="일반"].active{background:var(--green-l);color:var(--green);border-color:var(--green)}
.expire-row{display:flex;align-items:center;gap:10px}
.expire-row input[type=date]{
  flex:1;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:14px;background:var(--surface);font-family:inherit;color:var(--text);outline:none;
}
.expire-row input[type=date]:focus{border-color:var(--primary)}
.expire-clear{font-size:12px;font-weight:700;color:var(--red);cursor:pointer;white-space:nowrap}
.submit-btn{
  width:100%;padding:15px;border:none;border-radius:var(--r-sm);
  background:linear-gradient(135deg,var(--primary),var(--primary-d));
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:24px;font-family:inherit;
  box-shadow:0 4px 16px rgba(91,94,244,.32);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,94,244,.42)}
.submit-btn:active{transform:scale(.97)}
.submit-btn:disabled{background:#D1D5DB;box-shadow:none;cursor:not-allowed;transform:none}

/* ─── ATTACH ─────────────────────────────── */
.attach-btn-row{display:flex;gap:8px}
.attach-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:14px 8px;border:1.5px dashed var(--border);
  border-radius:var(--r-sm);background:var(--surface);
  cursor:pointer;font-size:11px;font-weight:700;color:var(--text3);
  letter-spacing:.2px;transition:all .2s;
}
.attach-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ll)}
.attach-btn .a-ico{display:flex;align-items:center;justify-content:center;transition:transform .2s}
.attach-btn:hover .a-ico{transform:scale(1.1)}
.attach-list{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.attach-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 13px;
  display:flex;align-items:center;gap:10px;
}
.a-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
.a-thumb-file{
  width:40px;height:40px;border-radius:8px;
  background:var(--primary-ll);border:1px solid rgba(91,94,244,.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.a-info{flex:1;min-width:0}
.a-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.a-size{font-size:11px;color:var(--text3);margin-top:1px}
.a-del{
  background:none;border:none;color:var(--text3);font-size:18px;
  cursor:pointer;padding:3px;flex-shrink:0;font-family:inherit;transition:color .15s;
  display:flex;align-items:center;
}
.a-del:hover{color:var(--red)}
.a-ocr-btn{
  background:var(--primary-ll);color:var(--primary);
  border:1px solid rgba(91,94,244,.2);border-radius:7px;
  padding:5px 10px;font-size:11px;font-weight:700;

.toast{

// 이미지 리사이즈 (OCR용 - 최대 1280px)
async function resizeImageBase64(dataUrl, maxPx=1600, quality=0.85){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w<=maxPx&&h<=maxPx&&quality>=0.85){res(dataUrl);return;}
      const ratio=Math.min(maxPx/w,maxPx/h,1);
      w=Math.round(w*ratio);h=Math.round(h*ratio);
      const cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>res(dataUrl);
    img.src=dataUrl;
  });
}

// Gemini API 호출 (라운드로빈 + 실패시 순차 다음 모델)
async function callGemini(parts){
  if(!GEMINI_KEY){
    const key=prompt('Gemini API 키를 입력하세요 (AQ로 시작):');
    if(!key) throw new Error('API 키가 없습니다');
    GEMINI_KEY=key.trim();
    await saveGeminiKey(GEMINI_KEY);
  }

  // 라운드로빈: 시작 모델 결정
  const startIdx = geminiModelIdx % GEMINI_MODELS.length;
  geminiModelIdx++; // 다음 호출을 위해 증가

  let lastErr = null;
  for(let i=0; i<GEMINI_MODELS.length; i++){
    const model = GEMINI_MODELS[(startIdx+i) % GEMINI_MODELS.length];
    try{
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
        {
          method:'POST',
          headers:{'Content-Type':'application/json','x-goog-api-key':GEMINI_KEY},
          body:JSON.stringify({contents:[{parts}]})
        }
      );
      const data=await res.json();
      if(data.error){
        console.warn(`${model} 오류:`,data.error.code,data.error.message);
        lastErr=new Error(`${model}: ${data.error.message}`);
        continue; // 다음 모델
      }
      const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
      console.log(`✓ ${model} 성공`);
      return text;
    }catch(e){
      console.warn(`${model} 실패:`,e.message);
      lastErr=e;
      // 네트워크 오류면 다음 모델 시도
    }
  }
  throw lastErr||new Error('모든 모델 실패');
}

function listenTopics(){
  loadGeminiKey();
  loadApps().then(()=>{ if(currentTab==='apps') renderTab(); });
  loadCats();

  // Firestore 실시간 구독
  const q = query(collection(db,'topics'));
  onSnapshot(q, (snap)=>{
    const prevIds = knownTopicIds;
    allTopics={};
    snap.forEach(d=>{
      allTopics[d.id]={...d.data(), id:d.id};
    });
    const curIds = new Set(Object.keys(allTopics));

    if(prevIds!==null){
      curIds.forEach(id=>{
        if(!prevIds.has(id)){
          const t=allTopics[id];
          if(t && t.createdBy!==currentUser){
            showLocalNotification('새 변경사항: '+t.title, (t.category||'기타')+' · '+(t.createdBy||''));
          }
        }
      });
      curIds.forEach(id=>{
        if(prevIds.has(id)){
          const t=allTopics[id];
          const prevV = window._prevVersions?.[id];
          if(t && prevV && t.currentVersion>prevV){
            showLocalNotification('변경사항 업데이트: '+t.title, 'v'+t.currentVersion+' · '+(t.category||''));
          }
        }
      });
    }
    knownTopicIds = curIds;
    window._prevVersions = {};
    Object.values(allTopics).forEach(t=>window._prevVersions[t.id]=t.currentVersion);

    checkExpiry();
    renderTab();
  }, (err)=>{
    console.error('topics read error:',err);
    toast('⚠ DB 읽기 실패: '+err.message);
  });

  testFirebaseWrite();
}
function checkExpiry(){
  const now=Date.now();
  Object.entries(allTopics).forEach(([id,t])=>{
    if(t.status==='active'&&t.expiresAt&&t.expiresAt<now){
      updateDoc(doc(db,'topics',id),{status:'expired'}).catch(e=>console.warn(e));
    }
  });
}
function topicList(){
  return Object.entries(allTopics).map(([id,t])=>({id,...t})).sort((a,b)=>{
    const o={필독:0,중요:1,일반:2};
    if(a.status==='active'&&b.status!=='active')return -1;
    if(a.status!=='active'&&b.status==='active')return 1;
    if((o[a.importance]||2)!==(o[b.importance]||2))return(o[a.importance]||2)-(o[b.importance]||2);
    return(b.lastUpdatedAt||0)-(a.lastUpdatedAt||0);
  });
}
function isConfirmed(t){
  const v=t.currentVersion||1;
  const conf=t.confirmations&&t.confirmations['v'+v];
  if(!conf) return false;
  // 한글 키(구버전)와 인코딩 키(신버전) 모두 체크
  return !!(conf[currentUser] || conf[encodeURIComponent(currentUser)]);
}
function confirmCount(t){
  const v=t.currentVersion||1;
  const conf=t.confirmations&&t.confirmations['v'+v]||{};
  // 인코딩 키와 원본 키 중복 제거
  const users=new Set();
  Object.keys(conf).forEach(k=>{
    try{users.add(decodeURIComponent(k));}catch(e){users.add(k);}
  });
  return users.size;
}
function unconfirmedList(){
  return topicList().filter(t=>t.status==='active'&&!isConfirmed(t));
}

window.deleteApp=async function(i){

};

let _dIdx=null,_dragItem=null,_dragOffY=0;
function bindAppDrag(cont){
  const items=[...cont.querySelectorAll('.app-item[data-index]')];
  items.forEach(item=>{
    const idx=+item.dataset.index;

    // 마우스 드래그
    item.draggable=true;
    item.addEventListener('dragstart',e=>{
      _dIdx=idx;e.dataTransfer.effectAllowed='move';
      setTimeout(()=>item.classList.add('dragging'),0);
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      items.forEach(c=>c.classList.remove('drag-over'));
      _dIdx=null;
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      items.forEach(c=>c.classList.remove('drag-over'));
      if(idx!==_dIdx)item.classList.add('drag-over');
    });
    item.addEventListener('drop',async e=>{
      e.preventDefault();
      items.forEach(c=>c.classList.remove('drag-over'));
      if(_dIdx===null||_dIdx===idx)return;
      const m=APPS.splice(_dIdx,1)[0];APPS.splice(idx,0,m);
      _dIdx=null;renderTab();await saveApps();
    });

    // 터치 드래그 - 아이템 자체를 fixed로 띄움
    item.addEventListener('touchstart',e=>{
      _dIdx=idx;_dragItem=item;
      const t=e.touches[0];
      const rect=item.getBoundingClientRect();
      _dragOffY=t.clientY-rect.top;
      // 플레이스홀더 (빈 자리 표시)
      const ph=document.createElement('div');
      ph.style.cssText='height:'+rect.height+'px;border-radius:14px;'
        +'background:var(--surface2);border:1.5px dashed var(--border2);'
        +'margin-bottom:9px;flex-shrink:0;';
      item.insertAdjacentElement('afterend',ph);
      item._ph=ph;
      // 아이템 고정 위치로
      item.style.cssText='position:fixed!important;z-index:9999;'
        +'width:'+rect.width+'px;left:'+rect.left+'px;top:'+rect.top+'px;'
        +'margin:0;opacity:.93;border-radius:14px;'
        +'box-shadow:0 10px 30px rgba(0,0,0,.2);';
    },{passive:true});

    item.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(_dragItem!==item)return;
      const t=e.touches[0];
      item.style.top=(t.clientY-_dragOffY)+'px';
      // 아이템 숨기고 아래 요소 탐색
      item.style.visibility='hidden';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      item.style.visibility='';
      items.forEach(c=>c.classList.remove('drag-over'));
      const ov=el?.closest('.app-item[data-index]');
      if(ov&&ov!==item)ov.classList.add('drag-over');
    },{passive:false});

    item.addEventListener('touchend',async e=>{
      if(_dragItem!==item){_dIdx=null;_dragItem=null;return;}
      // 스타일 복구
      item.style.cssText='';
      if(item._ph){item._ph.remove();item._ph=null;}
      items.forEach(c=>c.classList.remove('drag-over'));
      // 드롭 대상 찾기
      item.style.visibility='hidden';
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      item.style.visibility='';
      const ov=el?.closest('.app-item[data-index]');
      if(ov&&_dIdx!==null){
        const ti=+ov.dataset.index;
        if(_dIdx!==ti){
          const m=APPS.splice(_dIdx,1)[0];
          APPS.splice(ti,0,m);
          renderTab();
          await saveApps();
        }
      }
      _dIdx=null;_dragItem=null;
    });
  });
}

function makeIconSvg(iconKey, size, color){
  size=size||22; color=color||'currentColor';
  const d=ICON_DATA[iconKey];
  if(!d) return '';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">'+d+'</svg>';
}

async function loadApps(){
  try{
    const snap=await getDoc(doc(db,'rulebook','apps'));
    if(snap.exists()&&snap.data().list){
      APPS=snap.data().list.map(a=>({
        ...a,
        iconSvg:a.iconKey?makeIconSvg(a.iconKey):'',
      }));
    }
  }catch(e){console.warn('앱 로드 실패:',e);}
}
async function saveApps(){

  try{
    const saveList=APPS.map(a=>({
      name:String(a.name||''),
      desc:String(a.desc||''),
      url:String(a.url||''),
      icon:String(a.icon||'🔗'),
      iconKey:String(a.iconKey||''),
      color:String(a.color||'linear-gradient(135deg,#5B5EF4,#4447D4)')
    }));
    console.log('saveApps 시도:', saveList);
    await setDoc(doc(db,'rulebook','apps'),{list:saveList});
    toast('앱 저장됨 ✓');
    console.log('앱 저장 완료');
  }catch(e){
    console.error('앱 저장 실패:',e.code, e.message);
    alert('앱 저장 실패!\n'+e.code+'\n'+e.message);
  }
}

      <button class="filter-chip active" data-cat="전체">전체</button>
      ${CATS.map(c=>`<button class="filter-chip" data-cat="${esc(c)}">${esc(c)}</button>`).join('')}
    </div>
    <div id="searchResults"></div>`;
  el.querySelector('#searchInput').addEventListener('input',doSearch);
  el.querySelectorAll('.filter-chip').forEach(b=>b.addEventListener('click',e=>{
    el.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    e.currentTarget.classList.add('active');
    doSearch();
  }));
}

function doSearch(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
  const cat=document.querySelector('.filter-chip.active')?.dataset.cat||'전체';
  let list=topicList();
  if(cat!=='전체')list=list.filter(t=>t.category===cat);
  if(q)list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.content||'').toLowerCase().includes(q));
  const r=document.getElementById('searchResults');
  if(!r)return;
  if(!list.length){r.innerHTML=`<div class="empty-state"><div class="e-ico" style="color:var(--border)"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><p>검색 결과가 없습니다</p></div>`;return;}
  r.innerHTML=list.map(t=>cardHTML(t,!isConfirmed(t),t.status!=='active')).join('');
  bindCards(r);
}

function bindCards(el){
  el.querySelectorAll('.card[data-id]').forEach(c=>{
    c.addEventListener('click',()=>openDetail(c.dataset.id));
  });
}

// ── DETAIL ────────────────────────────────────
function openDetail(id){

  const t=allTopics[id];if(!t)return;
  const v=t.currentVersion||1;
  const conf=t.confirmations&&t.confirmations['v'+v]||{};
  const mine=!!(conf[currentUser]||conf[encodeURIComponent(currentUser)]);
  document.getElementById('detailTitle').textContent=t.title||'';
  document.getElementById('editBtn').style.display='block'; // 모든 직원 수정 가능
  document.getElementById('deleteBtn').style.display='block'; // 모든 직원 삭제 가능

  let h=`<span class="imp-badge ${t.importance||'일반'}">${t.importance||'일반'}</span>`;
  h+=`<div class="content-area">${esc(t.content||'')}</div>`;

  if(t.attachments&&t.attachments.length>0){
    h+=`<div class="detail-attach"><h4>📎 첨부 (${t.attachments.length})</h4><div class="detail-attach-list">`;
    t.attachments.forEach((a,i)=>{
      const src=a.dataUrl||a.storageUrl||'';
      if(a.isImage&&src)h+=`<img class="detail-attach-img" src="${src}" data-src="${src}">`;
      else if(a.isImage)h+=`<div style="width:76px;height:76px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px">🖼️</div>`;
      else if(a.storageUrl)h+=`<a class="detail-attach-file" href="${a.storageUrl}" target="_blank" rel="noopener">${fileIcon(a.type)} ${esc(a.name)}</a>`;
      else h+=`<span class="detail-attach-file" style="opacity:.5">${fileIcon(a.type)} ${esc(a.name)} (업로드 실패)</span>`;
    });
    h+=`</div></div>`;
  }

  h+=`<div class="info-grid">
    <div class="info-item"><div class="lbl">카테고리</div><div class="val">${esc(t.category||'기타')}</div></div>
    <div class="info-item"><div class="lbl">버전</div><div class="val">v${v}</div></div>
    <div class="info-item"><div class="lbl">등록자</div><div class="val">${esc(t.createdBy||'')}</div></div>
    <div class="info-item"><div class="lbl">상태</div><div class="val">${t.status==='active'?'✅ 유효':'⛔ 만료'}</div></div>
  </div>`;

  if(t.status==='active'){
    if(mine)h+=`<button class="big-confirm-btn confirmed">✅ 확인 완료</button>`;
    else h+=`<button class="big-confirm-btn" id="confirmBtn"><svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='20 6 9 17 4 12'/></svg> 확인했어요</button>`;
  }

  h+=`<div class="confirm-section"><h4>확인 현황</h4><div class="confirm-list">`;
  STAFF.forEach(s=>h+=`<span class="confirm-chip ${(conf[s]||conf[encodeURIComponent(s)])?'done':'pending'}">${(conf[s]||conf[encodeURIComponent(s)])?'✓ ':'✗ '}${s}</span>`);
  h+=`</div></div>`;

  const versions=t.versions||{};
  const vKeys=Object.keys(versions).sort((a,b)=>parseInt(b.slice(1))-parseInt(a.slice(1)));
  if(vKeys.length>1){
    h+=`<div class="version-section"><div class="version-toggle" id="vToggle">📜 변경 이력 (${vKeys.length}버전) <span>▼</span></div><div class="version-list" id="vList">`;
    vKeys.forEach(vk=>{const vd=versions[vk];h+=`<div class="version-item"><div class="v-head">${vk} · ${esc(vd.updatedBy||'')} · ${vd.updatedAt?new Date(vd.updatedAt).toLocaleDateString('ko'):''}</div><div class="v-note">${esc(vd.changeNote||vd.content||'')}</div></div>`;});
    h+=`</div></div>`;
  }

  document.getElementById('detailBody').innerHTML=h;

  document.getElementById('confirmBtn')?.addEventListener('click',()=>confirmTopic(id));
  document.getElementById('vToggle')?.addEventListener('click',()=>document.getElementById('vList').classList.toggle('show'));
  document.querySelectorAll('.detail-attach-img').forEach(img=>{
    img.addEventListener('click',()=>{
      const d=document.createElement('div');
      d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:700;display:flex;align-items:center;justify-content:center;cursor:pointer';
      d.innerHTML=`<img src="${img.dataset.src}" style="max-width:95vw;max-height:90vh;border-radius:8px">`;
      d.addEventListener('click',()=>d.remove());
      document.body.appendChild(d);
    });
  });
}

async function confirmTopic(id){
  const t=allTopics[id];if(!t)return;
  const v=t.currentVersion||1;

  // 로컬 즉시 반영 (인코딩 키로 저장)
  const safeU=encodeURIComponent(currentUser);
  if(!allTopics[id].confirmations) allTopics[id].confirmations={};
  if(!allTopics[id].confirmations['v'+v]) allTopics[id].confirmations['v'+v]={};
  allTopics[id].confirmations['v'+v][safeU]=Date.now();
  allTopics[id].confirmations['v'+v][currentUser]=Date.now(); // 구버전 호환
  openDetail(id);
  renderTab(); // 홈 배지 즉시 업데이트
  toast('✓ 확인 완료!');

  if(id.startsWith('local_')) return;
  try{
    const safeUser=encodeURIComponent(currentUser);
    const u={};
    u['confirmations.v'+v+'.'+safeUser]=Date.now();
    await updateDoc(doc(db,'topics',id),u);
  }catch(e){console.error('confirm save error',e);}
}

  // cat chips
  const active=t?t.category:CATS[0];
  document.getElementById('catChips').innerHTML=CATS.map(c=>`<div class="cat-chip${c===active?' active':''}" data-cat="${esc(c)}">${esc(c)}</div>`).join('');

  // 내용 칸에서 벗어날 때 제목 자동 설정
  cContent.addEventListener('blur',()=>{

    const lines=cContent.value.split('\n')
      .map(l=>l.replace(/^.*?:\s+/,'').trim())

}

// ── ATTACHMENTS ───────────────────────────────
function renderAttachList(){
  const el=document.getElementById('attachList');
  if(!el)return;
  if(!attachments.length){el.innerHTML='';return;}
  el.innerHTML='';
  attachments.forEach((a,i)=>{
    const previewSrc=a.dataUrl||a.storageUrl||'';
    const sizeKB=a.dataUrl?Math.round(a.dataUrl.length*0.75/1024):0;
    const item=document.createElement('div');
    item.className='attach-item';
    item.innerHTML=a.isImage
      ?`<img class="a-thumb" src="${previewSrc}">`
      :`<div class="a-thumb-file">${fileIcon(a.type)}</div>`;
    const info=document.createElement('div');info.className='a-info';
    const statusTxt=a.storageUrl?'☁ Storage':a.dataUrl?sizeKB+'KB':'업로드 실패';
    info.innerHTML=`<div class="a-name">${esc(a.name)}</div><div class="a-size">${statusTxt}</div>`;
    item.appendChild(info);
    if(a.isImage){
      const ob=document.createElement('button');ob.className='a-ocr-btn';ob.textContent='글자 읽기';
      ob.addEventListener('click',()=>runOCR(i));item.appendChild(ob);
    }
    const db2=document.createElement('button');db2.className='a-del';db2.textContent='×';
    db2.addEventListener('click',()=>{attachments.splice(i,1);renderAttachList();});
    item.appendChild(db2);
    el.appendChild(item);
  });
}

async function handleFiles(files){
  for(const file of Array.from(files)){
    await new Promise(res=>{
      const r=new FileReader();
      r.onload=e=>{
        // 로컬 미리보기용 dataUrl 저장 (Storage 업로드는 저장 시)
        attachments.push({
          name:file.name,
          type:file.type,
          dataUrl:e.target.result,
          isImage:file.type.startsWith('image/'),
          uploaded:false  // Storage 미업로드 상태
        });
        res();
      };
      r.readAsDataURL(file);
    });
  }
  renderAttachList();
}

// Storage에 첨부파일 업로드 후 URL 반환
async function uploadAttachments(topicId){
  const uploaded=[];
  for(let i=0;i<attachments.length;i++){
    const a=attachments[i];

    // 이미 Storage URL 있으면 그대로
    if(a.storageUrl){
      uploaded.push({name:a.name,type:a.type,isImage:a.isImage,storageUrl:a.storageUrl});
      continue;
    }
    if(!a.dataUrl){ uploaded.push({name:a.name,type:a.type,isImage:a.isImage}); continue; }

    try{
      if(a.isImage){
        // 이미지: 리사이즈 압축 후 Storage 업로드
        const compressed=await resizeImageBase64(a.dataUrl,1600,0.85);
        const url=await uploadToStorage(topicId,a.name,compressed,'image/jpeg');
        uploaded.push({name:a.name,type:'image/jpeg',isImage:true,storageUrl:url});
      }else{
        // 파일(PDF 등): 압축 없이 원본 그대로 Storage 업로드
        const url=await uploadToStorage(topicId,a.name,a.dataUrl,a.type);
        uploaded.push({name:a.name,type:a.type,isImage:false,storageUrl:url});
      }
    }catch(e){
      console.warn('업로드 실패:',a.name,e.message);
      uploaded.push({name:a.name,type:a.type,isImage:a.isImage,dataUrl:a.dataUrl});
    }
  }
  return uploaded;
}

// Firebase Storage 업로드 헬퍼
async function uploadToStorage(topicId, fileName, dataUrl, mimeType){
  if(!storage) throw new Error('Storage 미연결');
  const path=`change_photos/${topicId}_${Date.now()}_${fileName}`;
  const sRef=storageRef(storage,path);
  const base64=dataUrl.split(',')[1];
  await uploadString(sRef,base64,'base64',{contentType:mimeType||'application/octet-stream'});
  return await getDownloadURL(sRef);
}

async function runOCR(i){
  const a=attachments[i];if(!a||!a.isImage)return;
  document.getElementById('ocrOverlay').classList.add('show');
  try{
    // 1. 이미지 dataUrl 확보
    let dataUrl=a.dataUrl||'';
    if(!dataUrl&&a.storageUrl){
      const resp=await fetch(a.storageUrl);
      const blob=await resp.blob();
      dataUrl=await new Promise(res=>{
        const rd=new FileReader();rd.onload=e=>res(e.target.result);rd.readAsDataURL(blob);
      });
    }
    if(!dataUrl){toast('이미지를 읽을 수 없어요');return;}

    // 2. 리사이즈 (폰 카메라 고해상도 이미지 → 1280px 이하로 축소)
    const resized=await resizeImageBase64(dataUrl,1600);
    const base64=resized.split(',')[1];
    const mimeType='image/jpeg'; // 리사이즈 후 항상 jpeg

    // 3. Gemini OCR 호출
    const parts=[
      {inline_data:{mime_type:mimeType,data:base64}},
      {text:`이 이미지의 모든 텍스트를 빠짐없이 추출해주세요.

이미지 유형별 처리:
- 카카오톡/문자 캡처: 발화자 이름과 메시지 내용을 "[이름]: 내용" 형식으로 순서대로 추출
- 약품 라벨/처방전: 약품명, 용량, 복용법, 주의사항 그대로 추출
- 공문서/안내문: 제목과 본문 내용 그대로 추출
- 손글씨 메모: 읽을 수 있는 내용 최대한 추출
- 표/목록: 구조를 유지하며 추출

규칙:
- 보이는 텍스트는 하나도 빠짐없이 추출
- 시간, 숫자, 이모지, 기호도 포함
- 추출한 텍스트만 출력, 설명이나 주석 없이
- 텍스트가 전혀 없으면 이미지 내용을 한국어로 설명`}
    ];

    const text=await callGemini(parts);
    if(text&&text.trim()){
      const ta=document.getElementById('cContent');
      const prev=ta.value.trim();
      ta.value=prev?(prev+'\n\n'+text.trim()):text.trim();
      const titleEl=document.getElementById('cTitle');
      if(!titleEl.value.trim())
        titleEl.value=text.trim().split('\n')[0].replace(/[#*`]/g,'').trim().slice(0,30);
      ta.scrollTop=ta.scrollHeight;
      toast('텍스트 추출 완료!');
    }else{
      toast('텍스트를 찾지 못했어요');
    }
  }catch(e){
    console.error('OCR error:',e);
    toast('오류: '+e.message);
  }
  document.getElementById('ocrOverlay').classList.remove('show');
}

// ── SUBMIT ────────────────────────────────────
async function submitTopic(){
  try{
    if(!currentUser){toast('로그인이 필요합니다');return;}
    const editId=document.getElementById('cEditId').value;
    const title=(document.getElementById('cTitle').value||'').trim();
    const content=(document.getElementById('cContent').value||'').trim();
    const catEl=document.querySelector('.cat-chip.active');
    const impEl=document.querySelector('.imp-chip.active');
    const category=catEl?catEl.dataset.cat:'기타';
    const importance=impEl?impEl.dataset.v:'일반';
    const expStr=document.getElementById('cExpire').value;
    const expiresAt=expStr?new Date(expStr+'T23:59:59').getTime():null;
    if(!title){toast('제목을 입력하세요');return;}
    if(!content){toast('내용을 입력하세요');return;}
    const data={title,content,category,importance,expiresAt};
    const btn=document.getElementById('submitBtn');
    btn.textContent='저장 중...';btn.disabled=true;
    if(!editId){
      const similars=findSimilar(title,content);
      if(similars.length){
        btn.textContent='등록하기';btn.disabled=false;
        showSimilarPopup(similars,data);
        return;
      }
    }
    await saveTopic(editId,data);
  }catch(e){
    toast('오류: '+e.message);
    console.error('submitTopic error',e);
    const btn=document.getElementById('submitBtn');
    if(btn){btn.textContent='등록하기';btn.disabled=false;}
  }
}

async function saveTopic(editId, data){
  const now = Date.now();

  // ── 로컬 즉시 반영 ──────────────────────────
  if(editId && !editId.startsWith('local_')){
    const prev = allTopics[editId]||{};
    const newV = (prev.currentVersion||1)+1;
    allTopics[editId] = {...prev,
      title:data.title, content:data.content,
      category:data.category, importance:data.importance,
      status:'active', currentVersion:newV, lastUpdatedAt:now,
      versions:{...(prev.versions||{}),['v'+newV]:{content:data.content,updatedBy:currentUser,updatedAt:now,changeNote:data.title}},
      confirmations:{...(prev.confirmations||{}),['v'+newV]:{[currentUser]:now}}
    };
    if(data.expiresAt) allTopics[editId].expiresAt=data.expiresAt;
  } else if(!editId){
    const tmp='local_'+now;
    allTopics[tmp]={
      title:data.title, content:data.content,
      category:data.category, importance:data.importance,
      status:'active', currentVersion:1,
      createdBy:currentUser, createdAt:now, lastUpdatedAt:now,
      versions:{v1:{content:data.content,updatedBy:currentUser,updatedAt:now,changeNote:'최초 등록'}},
      confirmations:{v1:{[currentUser]:now}},
      ...(data.expiresAt?{expiresAt:data.expiresAt}:{})
    };
  }
  renderTab();
  document.getElementById('composeView').classList.remove('show');
  const btn=document.getElementById('submitBtn');
  if(btn){btn.textContent=editId?'업데이트':'등록하기';btn.disabled=false;}

  if(editId&&editId.startsWith('local_')){
    toast('저장됨 (오프라인)');
    return;
  }

  // ── Firestore 저장 ──────────────────────────
  try{
    const safeUser = encodeURIComponent(currentUser);

    if(editId){
      const prev = allTopics[editId];
      const newV = prev.currentVersion;

      // 첨부파일 압축 저장
      const uploadedAtts = attachments.length ? await uploadAttachments(editId) : undefined;

      const payload = {
        title: data.title,
        content: data.content,
        category: data.category,
        importance: data.importance,
        status: 'active',
        currentVersion: newV,
        lastUpdatedAt: now,
        ['versions.v'+newV]: {content:data.content,updatedBy:currentUser,updatedAt:now,changeNote:data.title},
        ['confirmations.v'+newV+'.'+safeUser]: now
      };
      if(data.expiresAt) payload.expiresAt = data.expiresAt;
      if(uploadedAtts) payload.attachments = uploadedAtts;
      await updateDoc(doc(db,'topics',editId), payload);
      toast('업데이트 완료 ✓');

    } else {
      // 신규: 먼저 doc 생성 후 id로 Storage 업로드
      const payload = {
        title: data.title,
        content: data.content,
        category: data.category,
        importance: data.importance,
        status: 'active',
        currentVersion: 1,
        createdBy: currentUser,
        createdAt: now,
        lastUpdatedAt: now,
        versions: {v1:{content:data.content,updatedBy:currentUser,updatedAt:now,changeNote:'최초 등록'}},
        confirmations: {v1:{[safeUser]:now}}
      };
      if(data.expiresAt) payload.expiresAt = data.expiresAt;

      const newRef = await addDoc(collection(db,'topics'), payload);

      // 첨부파일 압축 저장
      if(attachments.length){
        const uploadedAtts = await uploadAttachments(newRef.id);
        if(uploadedAtts.length){
          await updateDoc(doc(db,'topics',newRef.id),{attachments:uploadedAtts});
        }
      }

      // local_ → 실제 id 교체
      const tmpKey = 'local_'+now;
      if(allTopics[tmpKey]){
        allTopics[newRef.id]={...allTopics[tmpKey], id:newRef.id};
        delete allTopics[tmpKey];
        renderTab();
      }
      toast('등록 완료 ✓');
    }
  }catch(e){
    console.error('Firestore 오류:', e);
    alert('저장 실패!\n'+e.message);
  }
}

// ── SIMILAR ───────────────────────────────────
function findSimilar(title,content){
  const words=(title+' '+content).toLowerCase().split(/\s+/).filter(w=>w.length>1);
  return Object.entries(allTopics)
    .filter(([,t])=>t.status==='active')
    .map(([id,t])=>{
      const target=((t.title||'')+' '+(t.content||'')).toLowerCase();
      const score=words.length?words.filter(w=>target.includes(w)).length/words.length:0;
      return{id,...t,score};
    })
    .filter(t=>t.score>0.35)
    .sort((a,b)=>b.score-a.score).slice(0,3);
}

function showSimilarPopup(similars,newData){
  pendingNew=newData;
  const el=document.getElementById('similarInner');
  let h=`<h3>📎 유사한 변경사항이 있어요</h3><p>기존 변경사항을 업데이트하거나 새로 만들 수 있어요</p>`;
  similars.forEach(s=>{
    const preview=esc((s.content||'').slice(0,60))+(s.content&&s.content.length>60?'…':'');
    h+=`<div class="similar-item"><h4>${esc(s.title)}</h4><div class="sim-meta">${esc(s.category||'')} · v${s.currentVersion||1}</div>
    ${preview?`<div style="font-size:13px;color:var(--text2);margin:6px 0 10px;line-height:1.5;background:var(--bg);border-radius:8px;padding:8px 10px;">${preview}</div>`:''}
    <div class="sim-actions">
      <button class="sim-update" data-id="${s.id}">이 변경사항 업데이트</button>
      <button class="sim-new">새로 만들기</button>
    </div></div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.sim-update').forEach(b=>b.addEventListener('click',async()=>{
    document.getElementById('similarPopup').classList.remove('show');
    await saveTopic(b.dataset.id,pendingNew);
  }));
  el.querySelectorAll('.sim-new').forEach(b=>b.addEventListener('click',async()=>{
    document.getElementById('similarPopup').classList.remove('show');
    await saveTopic('',pendingNew);
  }));
  // 취소 버튼 추가
  const cancelBtn=document.createElement('button');
  cancelBtn.style.cssText='width:100%;padding:12px;border:none;border-radius:10px;background:var(--surface2);color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;';
  cancelBtn.textContent='취소';
  cancelBtn.addEventListener('click',()=>document.getElementById('similarPopup').classList.remove('show'));
  el.appendChild(cancelBtn);
  document.getElementById('similarPopup').classList.add('show');
}

// ── DELETE TOPIC ───────────────────────────────
async function deleteTopic(){
  const id = editingId;
  const t = allTopics[id];
  if(!t) return;
  if(!confirm(`"${t.title}" 변경사항을 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;

  // 로컬 즉시 제거
  delete allTopics[id];
  document.getElementById('detailView').classList.remove('show');
  renderTab();
  toast('변경사항이 삭제됐습니다');

  // Firestore 삭제
  if(!id.startsWith('local_')){
    try{
      await deleteDoc(doc(db,'topics',id));
    }catch(e){
      console.error('삭제 실패:',e);
      toast('⚠ 삭제 중 오류: '+e.message);
    }
  }
}

// ── ADMIN ─────────────────────────────────────
function openStaffModal(){
  renderStaffModal();
  document.getElementById('staffModal').classList.add('show');
  // 배경 클릭 닫기
  document.getElementById('staffModal').onclick=(e)=>{
    if(e.target===document.getElementById('staffModal'))
      document.getElementById('staffModal').classList.remove('show');
  };
  document.getElementById('staffModalInput').onkeydown=(e)=>{if(e.key==='Enter')addStaffModal();};
  document.getElementById('staffModalAddBtn').onclick=addStaffModal;
}

function renderStaffModal(){
  const list=document.getElementById('staffList');
  if(!list)return;
  list.innerHTML='';
  STAFF.forEach(name=>{
    const row=document.createElement('div');
    row.className='staff-row';
    const isAdmin=ADMIN.includes(name);
    row.innerHTML=`<span class="s-name">${esc(name)}</span>`
      +(isAdmin?'<span class="s-role">관리자</span>':'')
      +(!isAdmin?`<button class="s-del" title="삭제"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>`:'');
    if(!isAdmin){
      row.querySelector('.s-del').addEventListener('click',async()=>{
        if(!confirm(name+' 직원을 삭제하시겠습니까?'))return;
        STAFF=STAFF.filter(s=>s!==name);
        renderStaffModal();
        renderLoginGrid();
        try{await setDoc(doc(db,'rulebook','staff'),{list:STAFF});}catch(e){}
        toast(name+' 삭제됨');
      });
    }
    list.appendChild(row);
  });
}

async function addStaffModal(){
  const input=document.getElementById('staffModalInput');
  const name=(input.value||'').trim();
  if(!name){toast('이름을 입력하세요');return;}
  if(STAFF.includes(name)){toast('이미 있는 이름이에요');return;}
  STAFF=[...STAFF,name];
  input.value='';
  renderStaffModal();
  renderLoginGrid();
  try{await setDoc(doc(db,'rulebook','staff'),{list:STAFF});}catch(e){}
  toast(name+' 추가됨');
}

function showAdminStatus(){
  const topics=topicList().filter(t=>t.status==='active');
  const miss={};STAFF.forEach(s=>miss[s]=[]);
  topics.forEach(t=>{
    const v=t.currentVersion||1;const conf=t.confirmations&&t.confirmations['v'+v]||{};
    STAFF.forEach(s=>{if(!conf[s]&&!conf[encodeURIComponent(s)])miss[s].push(t.title);});
  });
  let msg='미확인 현황\n\n';
  STAFF.forEach(s=>{
    msg+=`${miss[s].length===0?'✓':'✗'} ${s}: ${miss[s].length}건\n`;
    miss[s].forEach(title=>msg+=`   · ${title}\n`);
  });
  alert(msg);
}

// ── CATEGORY MANAGEMENT ───────────────────────
async function loadCats(){
  try{
    const snap=await getDoc(doc(db,'rulebook','categories'));
    if(snap.exists()&&snap.data().list&&snap.data().list.length>0){
      CATS=snap.data().list;
    }
  }catch(e){}
}

async function saveCats(){
  try{ await setDoc(doc(db,'rulebook','categories'),{list:CATS}); }catch(e){}
}

function openCatModal(){
  renderCatModal();
  const modal=document.getElementById('catModal');
  modal.classList.add('show');
  modal.onclick=e=>{if(e.target===modal)modal.classList.remove('show');};
  document.getElementById('catModalInput').onkeydown=e=>{if(e.key==='Enter')addCatModal();};
  document.getElementById('catModalAddBtn').onclick=addCatModal;
}

function renderCatModal(){
  const list=document.getElementById('catList');
  if(!list)return;
  list.innerHTML='';
  CATS.forEach((name,idx)=>{
    const row=document.createElement('div');
    row.className='cat-row';
    const trashSvg='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
    row.innerHTML=`<span class="c-name">${esc(name)}</span><button class="c-del">${trashSvg}</button>`;
    row.querySelector('.c-del').addEventListener('click',async()=>{
      if(!confirm(name+' 카테고리를 삭제하시겠습니까?'))return;
      CATS=CATS.filter((_,i)=>i!==idx);
      await saveCats();
      renderCatModal();
      toast(name+' 삭제됨');
    });
    list.appendChild(row);
  });
}

async function addCatModal(){
  const input=document.getElementById('catModalInput');
  const name=(input.value||'').trim();
  if(!name){toast('카테고리 이름을 입력하세요');return;}
  if(CATS.includes(name)){toast('이미 있는 카테고리예요');return;}
  CATS=[...CATS,name];
  input.value='';
  await saveCats();
  renderCatModal();
  toast(name+' 추가됨');
}
